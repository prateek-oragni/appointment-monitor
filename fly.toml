app = "appointment-monitor"
primary_region = "lhr"

[build]

[env]
  DATA_DIR = "/data"
  CHECK_INTERVAL = "1800"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "monitor_data"
  destination = "/data"
